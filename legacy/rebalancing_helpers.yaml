# Battery Rebalancing Helpers
# Add these to configuration.yaml, or include via:
#   homeassistant:
#     packages:
#       battery_rebalancing: !include rebalancing_helpers.yaml

input_boolean:
  battery_rebalancing_enabled:
    name: Battery Rebalancing Enabled
    icon: mdi:battery-sync

  battery_rebalancing_active:
    name: Battery Rebalancing Active
    icon: mdi:battery-sync-outline

input_number:
  battery_rebalancing_start_threshold:
    name: Rebalancing Start Threshold
    min: 1
    max: 50
    step: 0.5
    unit_of_measurement: "%"
    mode: box
    icon: mdi:battery-arrow-up

  battery_rebalancing_stop_threshold:
    name: Rebalancing Stop Threshold
    min: 0.5
    max: 20
    step: 0.5
    unit_of_measurement: "%"
    mode: box
    icon: mdi:battery-arrow-down

  battery_rebalancing_transfer_rate_kw:
    name: Rebalancing Transfer Rate
    min: 0.5
    max: 7
    step: 0.5
    unit_of_measurement: kW
    mode: box
    icon: mdi:transfer
